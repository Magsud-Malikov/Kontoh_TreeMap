<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UK Renewable Energy — Year Comparison Treemap</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: rgba(255,255,255,0.45);
    --accent: #6aff7a;

    --wind:    #3b82c4;
    --biomass: #3ea83e;
    --biogas:  #a8b832;
    --hydro:   #2ac4c4;
    --solar:   #e8922a;
    --waste:   #b07060;
    --other:   #707070;
  }

  html, body {
    width: 100%; height: 100%; background: var(--bg);
    font-family: 'Barlow', sans-serif;
    color: var(--text); overflow: hidden;
  }

  /* ── HEADER ──────────────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header-left h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.25rem; font-weight: 700; letter-spacing: 0.02em;
  }
  .header-left h1 span { color: var(--accent); }
  .header-left p { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  /* ── YEAR CONTROLS ──────────────────────────────── */
  .controls { display: flex; align-items: center; margin-left: auto; }

  .year-group {
    display: flex; border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .year-btn {
    background: transparent; border: none; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em;
    padding: 6px 14px; cursor: pointer;
    transition: background 0.18s, color 0.18s;
  }
  .year-btn.active   { background: var(--accent); color: #0d0f14; }
  .year-btn:hover:not(.active) { background: rgba(255,255,255,0.06); color: var(--text); }

  /* ── TREEMAP CONTAINER ─────────────────────────── */
  #chart-wrap {
    position: relative;
    width: 100%; height: calc(100vh - 98px);
  }

  svg { display: block; width: 100%; height: 100%; }

  /* ── TILES ─────────────────────────────────────── */
  .tile rect {
    stroke: var(--bg); stroke-width: 2px;
    rx: 3; ry: 3;
    transition: opacity 0.15s;
  }
  .tile:hover rect { opacity: 0.82; cursor: pointer; }

  .tile text {
    pointer-events: none;
    dominant-baseline: hanging;
    fill: white;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .tile .cat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; fill: rgba(255,255,255,0.75);
  }
  .tile .sub-label {
    font-family: 'Barlow', sans-serif;
    font-size: 10px; fill: rgba(255,255,255,0.55);
  }
  .tile .val-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700;
  }
  .tile .delta-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 600;
  }

  /* ── LEGEND ─────────────────────────────────────── */
  #legend {
    display: flex; align-items: center; gap: 18px;
    padding: 6px 22px 8px; background: var(--surface);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--muted); }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── TOOLTIP ─────────────────────────────────────── */
  #tooltip {
    position: fixed; pointer-events: none;
    background: rgba(10,12,18,0.95);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px; padding: 10px 14px;
    font-size: 0.8rem; line-height: 1.55;
    max-width: 220px; z-index: 999;
    opacity: 0; transition: opacity 0.12s;
  }
  #tooltip.show { opacity: 1; }
  #tooltip b { font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; color: var(--text); }
  #tooltip .t-sub { color: var(--muted); font-size: 0.73rem; }
  #tooltip .t-val { color: var(--accent); font-weight: 600; margin-top: 4px; }
  #tooltip .t-delta { margin-top: 3px; }
  #tooltip .up   { color: #6aff7a; }
  #tooltip .down { color: #ff6a6a; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Total Generation <span>(GWh)</span> — Renewable Source &amp; Sub-Category</h1>
    <p>UK Renewable Energy · Source: BEIS / Digest of UK Energy Statistics</p>
  </div>
  <div class="controls">
    <div class="year-group" id="yearBtns"></div>
  </div>
</header>

<div id="chart-wrap">
  <!-- populated by JS -->
</div>

<div id="legend"></div>
<div id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  DATA  — extend / replace with real BEIS figures
// ═══════════════════════════════════════════════════════════
const YEARS = {
  2022: {
    Wind:               { sub: "Onshore",         value: 26800, color: "wind"    },
    "Offshore Wind":    { sub: "Offshore",         value: 22900, color: "wind"    },
    "Plant Biomass":    { sub: "Solid biomass",    value: 27200, color: "biomass" },
    "Solar PV":         { sub: "Photovoltaics",    value: 11900, color: "solar"   },
    Hydro:              { sub: "Large scale",      value:  9700, color: "hydro"   },
    "Landfill Gas":     { sub: "Biogas",           value:  8000, color: "biogas"  },
    "Anaerobic Dig.":   { sub: "Biogas",           value:  5200, color: "biogas"  },
    "Biogas Other":     { sub: "Biogas",           value:  2900, color: "biogas"  },
    "Energy fr Waste":  { sub: "EfW",              value:  7600, color: "waste"   },
    "Hydro (small)":    { sub: "Small scale",      value:  1700, color: "hydro"   },
    Other:              { sub: "Various",           value:  1200, color: "other"   },
  },
  2023: {
    Wind:               { sub: "Onshore",         value: 29000, color: "wind"    },
    "Offshore Wind":    { sub: "Offshore",         value: 27000, color: "wind"    },
    "Plant Biomass":    { sub: "Solid biomass",    value: 30500, color: "biomass" },
    "Solar PV":         { sub: "Photovoltaics",    value: 14200, color: "solar"   },
    Hydro:              { sub: "Large scale",      value: 10200, color: "hydro"   },
    "Landfill Gas":     { sub: "Biogas",           value:  8500, color: "biogas"  },
    "Anaerobic Dig.":   { sub: "Biogas",           value:  5600, color: "biogas"  },
    "Biogas Other":     { sub: "Biogas",           value:  3100, color: "biogas"  },
    "Energy fr Waste":  { sub: "EfW",              value:  8100, color: "waste"   },
    "Hydro (small)":    { sub: "Small scale",      value:  1900, color: "hydro"   },
    Other:              { sub: "Various",           value:  1500, color: "other"   },
  },
  2024: {
    Wind:               { sub: "Onshore",         value: 31400, color: "wind"    },
    "Offshore Wind":    { sub: "Offshore",         value: 32100, color: "wind"    },
    "Plant Biomass":    { sub: "Solid biomass",    value: 28900, color: "biomass" },
    "Solar PV":         { sub: "Photovoltaics",    value: 16800, color: "solar"   },
    Hydro:              { sub: "Large scale",      value:  9400, color: "hydro"   },
    "Landfill Gas":     { sub: "Biogas",           value:  7900, color: "biogas"  },
    "Anaerobic Dig.":   { sub: "Biogas",           value:  6200, color: "biogas"  },
    "Biogas Other":     { sub: "Biogas",           value:  3300, color: "biogas"  },
    "Energy fr Waste":  { sub: "EfW",              value:  8600, color: "waste"   },
    "Hydro (small)":    { sub: "Small scale",      value:  1800, color: "hydro"   },
    Other:              { sub: "Various",           value:  1900, color: "other"   },
  },
};

const COLOR_MAP = {
  wind:    "#3b82c4",
  biomass: "#3ea83e",
  biogas:  "#a8b832",
  hydro:   "#2ac4c4",
  solar:   "#e8922a",
  waste:   "#b07060",
  other:   "#707070",
};

const CATEGORIES = {
  wind:    "WIND",
  biomass: "PLANT BIOMASS",
  biogas:  "BIOGAS",
  hydro:   "HYDRO",
  solar:   "SOLAR PHOTOVOLTAICS",
  waste:   "ENERGY FROM WASTE",
  other:   "OTHER",
};

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let activeYear = 2023;

// ═══════════════════════════════════════════════════════════
//  BUILD YEAR BUTTONS
// ═══════════════════════════════════════════════════════════
const yearBtnsEl = document.getElementById("yearBtns");
Object.keys(YEARS).forEach(y => {
  const btn = document.createElement("button");
  btn.className = "year-btn" + (parseInt(y) === activeYear ? " active" : "");
  btn.textContent = y;
  btn.addEventListener("click", () => {
    activeYear = parseInt(y);
    document.querySelectorAll(".year-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderSingle(activeYear);
  });
  yearBtnsEl.appendChild(btn);
});

// ═══════════════════════════════════════════════════════════
//  LEGEND
// ═══════════════════════════════════════════════════════════
const legendEl = document.getElementById("legend");
Object.entries(CATEGORIES).forEach(([key, label]) => {
  const item = document.createElement("div");
  item.className = "leg-item";
  item.innerHTML = `<div class="leg-dot" style="background:${COLOR_MAP[key]}"></div><span>${label}</span>`;
  legendEl.appendChild(item);
});

// ═══════════════════════════════════════════════════════════
//  TREEMAP HELPERS
// ═══════════════════════════════════════════════════════════
function buildHierarchy(year) {
  const data = YEARS[year];
  return {
    name: "root",
    children: Object.entries(data).map(([name, d]) => ({
      name, sub: d.sub, value: d.value, color: d.color,
    }))
  };
}

function makeTreemap(width, height, year) {
  const h = d3.hierarchy(buildHierarchy(year)).sum(d => d.value);
  d3.treemap().size([width, height]).padding(3).round(true)(h);
  return h;
}

function fmtVal(v) {
  return v >= 1000 ? (v / 1000).toFixed(1) + " TWh" : v + " GWh";
}

function lighten(hex, pct = 0.3) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (n >> 16) + Math.round(255 * pct));
  const g = Math.min(255, ((n >> 8) & 0xff) + Math.round(255 * pct));
  const b = Math.min(255, (n & 0xff) + Math.round(255 * pct));
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════════════
const tooltip = document.getElementById("tooltip");

function showTip(event, d, compareYear) {
  const col = COLOR_MAP[d.data.color];
  let deltaHtml = "";
  if (compareYear !== undefined) {
    const prev = YEARS[compareYear][d.data.name];
    if (prev) {
      const pct = ((d.data.value - prev.value) / prev.value * 100).toFixed(1);
      const cls = pct >= 0 ? "up" : "down";
      const arrow = pct >= 0 ? "▲" : "▼";
      deltaHtml = `<div class="t-delta <span class="${cls}">${arrow} ${Math.abs(pct)}% vs ${compareYear}</span></div>`;
    }
  }
  tooltip.innerHTML = `
    <b style="color:${col}">${d.data.name}</b>
    <div class="t-sub">${d.data.sub}</div>
    <div class="t-val">${fmtVal(d.data.value)}</div>
    ${deltaHtml}
  `;
  tooltip.classList.add("show");
  moveTip(event);
}

function moveTip(event) {
  const x = event.clientX + 14;
  const y = event.clientY - 10;
  tooltip.style.left = Math.min(x, window.innerWidth - 230) + "px";
  tooltip.style.top  = Math.max(y, 10) + "px";
}

function hideTip() { tooltip.classList.remove("show"); }

// ═══════════════════════════════════════════════════════════
//  DRAW TILES (shared)
// ═══════════════════════════════════════════════════════════
function drawTiles(svg, root, compareYear) {
  const tiles = svg.selectAll(".tile")
    .data(root.leaves(), d => d.data.name);

  const enter = tiles.enter().append("g")
    .attr("class", "tile")
    .attr("transform", d => `translate(${d.x0},${d.y0})`);

  enter.append("rect")
    .attr("width",  d => Math.max(0, d.x1 - d.x0))
    .attr("height", d => Math.max(0, d.y1 - d.y0))
    .attr("fill", d => {
      const c = COLOR_MAP[d.data.color];
      return `url(#grad-${d.data.color})`;
    })
    .attr("rx", 3).attr("ry", 3);

  enter.each(function(d) {
    const g   = d3.select(this);
    const w   = d.x1 - d.x0;
    const h   = d.y1 - d.y0;
    const pad = 8;
    if (w < 30 || h < 22) return;

    if (h > 60 && w > 60) {
      g.append("text").attr("class","cat-label")
        .attr("x", pad).attr("y", pad)
        .text(CATEGORIES[d.data.color] || d.data.name.toUpperCase());
    }

    if (h > 90 && w > 50) {
      g.append("text").attr("class","sub-label")
        .attr("x", pad).attr("y", 26)
        .text(d.data.sub);
    }

    if (h > 50 && w > 45) {
      g.append("text").attr("class","val-label")
        .attr("x", pad)
        .attr("y", h > 90 ? 42 : (h > 60 ? 26 : 10))
        .text(fmtVal(d.data.value));
    }

    // Delta badge in split mode
    if (compareYear !== undefined && w > 55 && h > 55) {
      const prev = YEARS[compareYear]?.[d.data.name];
      if (prev) {
        const pct = ((d.data.value - prev.value) / prev.value * 100).toFixed(1);
        const isUp = pct >= 0;
        const badge = g.append("text").attr("class","delta-badge")
          .attr("x", w - pad).attr("y", pad + 10)
          .attr("text-anchor","end")
          .attr("fill", isUp ? "#6aff7a" : "#ff6a6a")
          .text((isUp ? "▲" : "▼") + " " + Math.abs(pct) + "%");
      }
    }
  });

  // tooltip events on enter
  enter.on("mousemove", function(event, d) { showTip(event, d, compareYear); moveTip(event); })
       .on("mouseleave", hideTip);

  // UPDATE (animated transition on year change)
  const all = enter.merge(tiles);
  all.transition().duration(500).ease(d3.easeCubicInOut)
    .attr("transform", d => `translate(${d.x0},${d.y0})`);

  all.select("rect")
    .transition().duration(500).ease(d3.easeCubicInOut)
    .attr("width",  d => Math.max(0, d.x1 - d.x0))
    .attr("height", d => Math.max(0, d.y1 - d.y0));

  tiles.exit().remove();

  return svg;
}

// ═══════════════════════════════════════════════════════════
//  GRADIENTS
// ═══════════════════════════════════════════════════════════
function addGradients(svg) {
  const defs = svg.append("defs");
  Object.entries(COLOR_MAP).forEach(([key, hex]) => {
    const grad = defs.append("linearGradient")
      .attr("id", `grad-${key}`)
      .attr("x1","0%").attr("y1","0%")
      .attr("x2","100%").attr("y2","100%");
    grad.append("stop").attr("offset","0%")  .attr("stop-color", lighten(hex, 0.18));
    grad.append("stop").attr("offset","100%").attr("stop-color", hex);
  });
}

// ═══════════════════════════════════════════════════════════
//  RENDER SINGLE
// ═══════════════════════════════════════════════════════════
function renderSingle(year) {
  const wrap = document.getElementById("chart-wrap");
  wrap.classList.remove("split");
  wrap.innerHTML = "";
  const pane = document.createElement("div");
  pane.className = "pane"; pane.style.width = "100%"; pane.style.height = "100%";
  wrap.appendChild(pane);

  const W = pane.offsetWidth, H = pane.offsetHeight;
  const svg = d3.select(pane).append("svg")
    .attr("viewBox", `0 0 ${W} ${H}`)
    .attr("preserveAspectRatio","none");

  addGradients(svg);
  const root = makeTreemap(W, H, year);
  drawTiles(svg, root, undefined);
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener("resize", () => renderSingle(activeYear));

renderSingle(activeYear);
</script>
</body>
</html>
